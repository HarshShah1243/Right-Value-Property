    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ duration: 800, once: true, disable: 'mobile' });

            const listingsContainer = document.getElementById('property-listings');
            const paginationControls = document.getElementById('pagination-controls');
            let allProperties = [];
            const propertiesPerPage = 6;
            let currentPage = 1;

            const fetchData = async (collectionName) => {
                try {
                    const response = await fetch(`api/api.php?collection=${collectionName}`);
                    if (!response.ok) return [];
                    return await response.json();
                } catch (error) {
                    console.error(`Failed to fetch ${collectionName}:`, error);
                    return [];
                }
            };
            
            async function loadContent() {
                allProperties = await fetchData('properties_sale');
                if (listingsContainer) {
                    displayProperties(currentPage);
                    setupPagination();
                }
            }

            function displayProperties(page) {
                listingsContainer.innerHTML = '';
                page--; // Use zero-based index

                const startIndex = propertiesPerPage * page;
                const endIndex = startIndex + propertiesPerPage;
                const paginatedProperties = allProperties.slice(startIndex, endIndex);

                if (paginatedProperties.length === 0) {
                    listingsContainer.innerHTML = '<p class="col-span-full text-center text-gray-500">No properties found.</p>';
                    return;
                }

                paginatedProperties.forEach((prop, index) => {
                    const card = `
                        <div class="bg-white rounded-lg shadow-lg overflow-hidden card-hover property-card-reveal flex flex-col" data-aos="fade-up" data-aos-delay="${index * 100}">
                            <div class="overflow-hidden relative h-56">
                                <img src="${prop.main_image || 'https://placehold.co/600x400/e0e0e0/ffffff?text=RVP'}" alt="${prop.title}" class="w-full h-full object-cover card-image">
                                <div class="hover-content">
                                    ${prop.living_room_image ? `<div class="sub-image-container living-room"><img src="${prop.living_room_image}" alt="Living Room" class="sub-image"></div>` : ''}
                                    ${prop.bedroom_image ? `<div class="sub-image-container bedroom"><img src="${prop.bedroom_image}" alt="Bedroom" class="sub-image"></div>` : ''}
                                    ${prop.kitchen_image ? `<div class="sub-image-container kitchen"><img src="${prop.kitchen_image}" alt="Kitchen" class="sub-image"></div>` : ''}
                                    ${prop.bathroom_image ? `<div class="sub-image-container bathroom"><img src="${prop.bathroom_image}" alt="Bathroom" class="sub-image"></div>` : ''}
                                </div>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                 <h3 class="text-xl font-bold text-[var(--text-dark)] mb-2">${prop.title}</h3>
                                 <p class="text-gray-500 text-sm mb-4">${prop.location}</p>
                                 <div class="text-2xl font-extrabold mb-4" style="color: var(--primary-red);">${prop.price}</div>
                                 <div class="flex justify-between text-sm text-gray-600 border-t pt-4 mt-auto">
                                    <span><strong class="text-gray-800">${prop.beds || 0}</strong> Beds</span>
                                    <span><strong class="text-gray-800">${prop.baths || 0}</strong> Baths</span>
                                    <span><strong class="text-gray-800">${prop.sqft || 0}</strong> sqft</span>
                                 </div>
                                 <a href="property-details.html?id=${prop.id}" class="block text-center mt-4 px-4 py-2 text-sm font-semibold rounded-md text-white transition-colors" style="background-color: var(--primary-red-dark);">Know More</a>
                            </div>
                        </div>
                    `;
                    listingsContainer.innerHTML += card;
                });
            }

            function setupPagination() {
                if (!paginationControls || allProperties.length <= propertiesPerPage) {
                    if (paginationControls) paginationControls.innerHTML = '';
                    return;
                }
                const pageCount = Math.ceil(allProperties.length / propertiesPerPage);
                paginationControls.innerHTML = '';

                // Previous Button
                const prevButton = document.createElement('button');
                prevButton.innerHTML = `<i class="fas fa-arrow-left"></i>`;
                prevButton.className = 'pagination-link relative inline-flex items-center justify-center w-10 h-10 rounded-md border border-gray-300 bg-white text-sm font-medium text-gray-500';
                prevButton.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        displayProperties(currentPage);
                        updatePagination();
                    }
                });
                paginationControls.appendChild(prevButton);

                // Page Number Buttons
                for (let i = 1; i <= pageCount; i++) {
                    const pageButton = document.createElement('button');
                    pageButton.innerText = i;
                    pageButton.className = 'pagination-link relative inline-flex items-center justify-center w-10 h-10 border border-gray-300 bg-white text-sm font-medium text-gray-700 rounded-md';
                    if (i === currentPage) {
                        pageButton.classList.add('active');
                    }
                    pageButton.addEventListener('click', () => {
                        currentPage = i;
                        displayProperties(currentPage);
                        updatePagination();
                    });
                    paginationControls.appendChild(pageButton);
                }

                // Next Button
                const nextButton = document.createElement('button');
                nextButton.innerHTML = `<i class="fas fa-arrow-right"></i>`;
                nextButton.className = 'pagination-link relative inline-flex items-center justify-center w-10 h-10 rounded-md border border-gray-300 bg-white text-sm font-medium text-gray-500';
                nextButton.addEventListener('click', () => {
                    if (currentPage < pageCount) {
                        currentPage++;
                        displayProperties(currentPage);
                        updatePagination();
                    }
                });
                paginationControls.appendChild(nextButton);
                
                updatePagination();
            }

            function updatePagination() {
                if (!paginationControls) return;
                const pageCount = Math.ceil(allProperties.length / propertiesPerPage);
                const buttons = paginationControls.querySelectorAll('button');
                
                buttons.forEach(button => {
                    button.classList.remove('active', 'disabled');
                    if (parseInt(button.innerText) === currentPage) {
                        button.classList.add('active');
                    }
                });
                if (currentPage === 1) {
                    buttons[0].classList.add('disabled');
                }
                if (currentPage === pageCount) {
                    buttons[buttons.length - 1].classList.add('disabled');
                }
            }

            // Mobile Menu Toggle
            document.getElementById('mobile-menu-button').addEventListener('click', function() {
                document.getElementById('mobile-menu').classList.toggle('hidden');
            });
            
            // Header Scroll Effect
            const header = document.querySelector('header');
            window.addEventListener('scroll', () => {
                header.classList.toggle('scrolled', window.scrollY > 50);
            });

            // Initial Load
            loadContent();
        });
    </script>
